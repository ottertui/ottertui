name: Stale

on:
  schedule:
    - cron: '13 4 * * *'  # daily at 04:13 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 90
          days-before-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'keep,bug,security'
          exempt-pr-labels: 'keep,security'
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
          close-issue-message: >
            This issue was closed due to inactivity. Feel free to reopen if it
            is still relevant.
          close-pr-message: >
            This PR was closed due to inactivity. Feel free to reopen if you
            plan to continue working on it.
